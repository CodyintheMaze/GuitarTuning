<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gears & Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Metal+Mania&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Metal Mania', cursive;
        }
        .artist-card {
            transition: transform 0.2s;
        }
        .artist-card:hover {
            transform: scale(1.05);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 50;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1f1f1f;
            border: 2px solid purple;
            border-radius: 10px;
            padding: 20px;
            max-width: 700px;
            width: 95%;
            text-align: center;
        }

        #modal-body::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="bg-black text-white overflow-auto">
    <a href="home.html" class="absolute top-4 left-4 text-purple-400 hover:text-purple-300 z-10">← BACK</a>
    
    <div class="min-h-screen flex flex-col items-center justify-center p-8">
        <h1 class="text-5xl font-bold mb-8 text-center" style="background: linear-gradient(45deg, #800080, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">GEARS & TOOLS</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl">
            <div class="artist-card bg-zinc-900 border border-purple-500 rounded-lg p-6 text-center cursor-pointer" onclick="openModal('Deftones')">
                <img src="logos/deftones.png" alt="Deftones" class="w-32 h-32 mx-auto mb-4 object-contain">
                <h2 class="text-2xl text-purple-400">Deftones</h2>
            </div>
            <div class="artist-card bg-zinc-900 border border-purple-500 rounded-lg p-6 text-center cursor-pointer" onclick="openModal('Korn')">
                <img src="logos/korn.png" alt="Korn" class="w-32 h-32 mx-auto mb-4 object-contain">
                <h2 class="text-2xl text-purple-400">Korn</h2>
            </div>
            <div class="artist-card bg-zinc-900 border border-purple-500 rounded-lg p-6 text-center cursor-pointer" onclick="openModal('Slipknot')">
                <img src="logos/slipknot.jpg" alt="Slipknot" class="w-32 h-32 mx-auto mb-4 object-contain">
                <h2 class="text-2xl text-purple-400">Slipknot</h2>
            </div>
            <div class="artist-card bg-zinc-900 border border-purple-500 rounded-lg p-6 text-center cursor-pointer" onclick="openModal('Metallica')">
                <img src="logos/metallica.png" alt="Metallica" class="w-32 h-32 mx-auto mb-4 object-contain">
                <h2 class="text-2xl text-purple-400">Metallica</h2>
            </div>
            <div class="artist-card bg-zinc-900 border border-purple-500 rounded-lg p-6 text-center cursor-pointer" onclick="openModal('Gojira')">
                <img src="logos/gojira.jpg" alt="Gojira" class="w-32 h-32 mx-auto mb-4 object-contain">
                <h2 class="text-2xl text-purple-400">Gojira</h2>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <button onclick="closeModal()" class="absolute top-2 right-2 text-purple-400 hover:text-purple-300 text-2xl">&times;</button>
            <h2 id="modal-title" class="text-3xl text-purple-400 mb-6"></h2>
            <div id="modal-body" class="space-y-4 max-h-[500px] overflow-y-auto"></div>
        </div>
    </div>

    <script>
        const artistData = {
            'Deftones': [
                { song: 'My Own Summer (Shove It)', album: 'Around the Fur', year: 1997, tuning: '(C# G# C# F# A# D#)' },
                { song: 'Be Quiet and Drive (Far Away)', album: 'Around the Fur', year: 1997, tuning: '(C# G# C# F# A# D#)' },
                { song: 'Digital Bath', album: 'White Pony', year: 2000, tuning: '(C G C F A D)' },
                { song: 'Change (In the House of Flies)', album: 'White Pony', year: 2000, tuning: '(C G C F A D)' },
                { song: 'Cherry Waves', album: 'Saturday Night Wrist', year: 2006, tuning: 'on 7 strings (F# C# F# B E G# C#)' },
                { song: 'Kimdracula', album: 'Saturday Night Wrist', year: 2006, tuning: 'on 7 strings (F# C# F# B E G# C#)' },
                { song: 'Leathers', album: 'Koi No Yokan', year: 2012, tuning: 'on 8 strings (E B E A D G B E)' },
                { song: 'Entombed', album: 'Koi No Yokan', year: 2012, tuning: 'on 8 strings (E B E A D G B E)' },
                { song: 'Rosemary', album: 'Koi No Yokan', year: 2012, tuning: '(A# G C F A D)' },
                { song: 'Battle‑Axe', album: 'Deftones', year: 2003, tuning: '(C# G# C# F# A# D#)' },
                { song: 'My Mind Is a Mountain', album: 'Private Music', year: 2025, tuning: '(C G C F A D)' },
                { song: 'Genesis', album: 'Ohms', year: 2020, tuning: '(C G C F A D)' },
                { song: '(L)MIRL', album: 'Gore', year: 2016, tuning: '(E A D G B E)' },
                { song: 'Sextape', album: 'Diamond Eyes', year: 2010, tuning: '(C G C F A D)' },
                { song: 'Dai the Flu', album: 'Around the Fur', year: 1997, tuning: '(D# G# C# F# A# D#)' },
                { song: 'Elite', album: 'White Pony', year: 2000, tuning: '(C G C F A D)' },
                { song: 'Rx Queen', album: 'White Pony', year: 2000, tuning: '(C G C F A D)' },
                { song: 'Ceremony', album: 'Ohms', year: 2020, tuning: 'on 8 strings (F# B E A D G B E)' },
                { song: 'Lotion', album: 'Around the Fur', year: 1997, tuning: '(C# G# C# F# A# D#)' },
                { song: 'Mascara', album: 'Around the Fur', year: 1997, tuning: '(D# G# C# F# A# D#)' },
                { song: 'Prince', album: 'Diamond Eyes', year: 2010, tuning: 'on 8 strings (F# B E A D G B E)' },
                { song: 'Poltergeist', album: 'Koi No Yokan', year: 2012, tuning: 'on 8 strings (E B E A D G B E)' },
                { song: 'Minerva', album: 'Deftones', year: 2003, tuning: '(C# G# C# F# A# D#)' }
            ]
        };

        function openModal(artist) {
            document.getElementById('modal-title').textContent = artist;
            const body = document.getElementById('modal-body');
            if (artistData[artist]) {
                body.innerHTML = artistData[artist].map(item => `
                    <div class="bg-zinc-800 p-4 rounded-lg">
                        <div class="text-lg font-bold text-white">${item.song}</div>
                        <div class="text-sm text-zinc-400">${item.album} (${item.year})</div>
                        <div class="text-sm text-purple-400">${item.tuning}</div>
                    </div>
                `).join('');
            } else {
                body.innerHTML = `
                    <button class="w-full bg-purple-600 hover:bg-purple-500 py-3 rounded-lg text-lg">Songs</button>
                    <button class="w-full bg-purple-600 hover:bg-purple-500 py-3 rounded-lg text-lg">Tunings</button>
                    <button class="w-full bg-purple-600 hover:bg-purple-500 py-3 rounded-lg text-lg">Gears</button>
                `;
            }
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // Close modal when clicking outside
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
